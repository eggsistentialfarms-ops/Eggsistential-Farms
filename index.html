<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fallback title/description — every page overrides these via
         the useSEO hook (src/lib/seo.ts) once it loads, but these
         matter for the very first moment a crawler or link-preview
         bot sees the page before JavaScript runs. -->
    <title>Eggsistential Farms — Fresh Eggs, Bread, Honey & Farm Merch</title>
    <meta name="description" content="Eggsistential Farms is a backyard co-op selling pasture-raised eggs, hand-baked bread, raw honey (coming soon), and farm merch. Local pickup or shipping." />
    <meta name="robots" content="index, follow" />

    <!-- Once you connect Google Search Console (search.google.com/search-console),
         it will give you a line like the one below to paste in here to verify
         ownership of your site. Leave commented out until then. -->
    <!-- <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" /> -->

    <!-- Structured data: tells Google this is a local food business.
         Update the phone/email/social links below to your real ones.
         See README.md for notes on adding a street address here. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Store", "LocalBusiness"],
        "name": "Eggsistential Farms",
        "description": "A backyard co-op selling pasture-raised eggs, hand-baked bread, raw honey, and farm merch.",
        "url": "https://www.eggsistentialfarms.com",
        "logo": "https://www.eggsistentialfarms.com/logo.png",
        "image": "https://www.eggsistentialfarms.com/logo.png",
        "email": "hello@eggsistentialfarms.com",
        "priceRange": "$"
      }
    </script>
